<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sniffies Intent Bar (iPhone) — Harness</title>
  <meta name="sniffies-iphone-harness" content="1" />
  <style>
    body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: #0b0f14; color: #e6edf3; }
    #fixture { min-height: 55vh; padding: 16px; padding-bottom: 220px; }
    #controls { position: sticky; top: 0; z-index: 10; display: flex; gap: 8px; flex-wrap: wrap; padding: 12px; background: #161b22; border-bottom: 1px solid #21262d; }
    #controls button { padding: 10px 12px; min-height: 40px; border-radius: 8px; border: 1px solid #30363d; background: #21262d; color: #e6edf3; cursor: pointer; }
    #results { padding: 12px 16px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; white-space: pre-wrap; }
    .pass { color: #2ea043; }
    .fail { color: #da3633; }
    app-profile, app-chat-list, #chat-input-panel { display: block; margin: 12px 0; padding: 16px; border: 1px solid #30363d; border-radius: 10px; background: #161b22; }
    textarea { width: 100%; min-height: 48px; background: #0d1117; color: #e6edf3; border: 1px solid #30363d; border-radius: 8px; padding: 8px; font-size: 16px; }
    .profile-rail {
      position: absolute;
      right: 8px;
      top: 80px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 2;
    }
    .profile-rail button {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #e6edf3;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="controls">
    <button data-scene="map">MAP</button>
    <button data-scene="chats">CHATS_LIST</button>
    <button data-scene="profile">PROFILE</button>
    <button data-scene="chat">CHAT</button>
    <button id="run-tests">Run tests</button>
  </div>
  <div id="fixture"></div>
  <div id="results"></div>

  <div class="bottom-menu" style="position:fixed;bottom:0;left:0;right:0;height:48px;opacity:0;pointer-events:none">
    <button data-testid="chatButtonIcon" aria-label="Chat List"></button>
    <button data-testid="globalChatIcon" class="global-chat-nav"></button>
  </div>

  <script src="./Sniffies-iPhone.js"></script>
  <script>
    const fixture = document.getElementById("fixture");
    const results = document.getElementById("results");

    function clearFixture() {
      fixture.innerHTML = "";
    }

    function sceneMap() {
      clearFixture();
      fixture.innerHTML = "<h2>Map</h2><p>Markers only.</p>";
    }

    function sceneChats() {
      clearFixture();
      fixture.innerHTML = `
        <app-chat-list style="display:block;width:320px;height:400px">
          <button data-testid="chatListTab-recents">Recents</button>
          <button data-testid="chatListTab-screened">Screened</button>
          <button data-testid="chatListTab-pinned">Pinned</button>
          <button data-testid="chatListTab-favorites">Favorites</button>
          <button data-testid="chatListTab-places">Places</button>
          <div data-testid="sniffiesChatRow" style="display:block;width:280px;height:48px">User A — hey</div>
          <div data-testid="sniffiesChatRow" style="display:block;width:280px;height:48px">User B — wyd</div>
        </app-chat-list>`;
    }

    function sceneProfile() {
      clearFixture();
      fixture.innerHTML = `
        <app-profile style="display:block;position:relative;width:360px;height:640px" aria-label="View Profile Photo">
          <img alt="profile" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" style="width:100%;height:220px;object-fit:cover;background:#333" />
          <div data-testid="profileHeadlineTableContainer">Registered Cruiser</div>
          <table class="profile-data-table">
            <tr><td>
              <profile-stats>
                <span data-testid="ageStat">27</span>
                <span data-testid="genderStat">m</span>
                <span data-testid="heightInCmStat">5'9"</span>
                <span data-testid="weightInKgStat">165lb</span>
                <span data-testid="endowmentStat">7"</span>
                <span data-testid="spectrumStat">gay</span>
                <span data-testid="attitudeStat">top</span>
              </profile-stats>
            </td></tr>
          </table>
          <app-profile-place-and-time data-testid="profilePlaceAndTimeComponent">I'm hosting</app-profile-place-and-time>
          <profile-cruiser-stats-container data-testid="profileCruiserFullStatsContainer">
            <profile-cruiser-stats-row>
              <div class="profile-cruiser-stats-row-container">
                <div class="profile-cruiser-stats-row">
                  <div class="profile-cruiser-stats-row-title"><p>Location</p></div>
                  <div class="profile-cruiser-stats-row-badges">
                    <profile-cruiser-stats-badge><div class="profile-cruiser-stats-badge" data-testid="hostingHost"><p>Can host</p></div></profile-cruiser-stats-badge>
                  </div>
                </div>
              </div>
            </profile-cruiser-stats-row>
            <profile-cruiser-stats-row>
              <div class="profile-cruiser-stats-row-container">
                <div class="profile-cruiser-stats-row">
                  <div class="profile-cruiser-stats-row-title"><p>Into Public</p></div>
                  <div class="profile-cruiser-stats-row-badges">
                    <profile-cruiser-stats-badge><div class="profile-cruiser-stats-badge"><p>Cars</p></div></profile-cruiser-stats-badge>
                    <profile-cruiser-stats-badge><div class="profile-cruiser-stats-badge"><p>Beaches</p></div></profile-cruiser-stats-badge>
                  </div>
                </div>
              </div>
            </profile-cruiser-stats-row>
            <profile-cruiser-stats-row>
              <div class="profile-cruiser-stats-row-container">
                <div class="profile-cruiser-stats-row">
                  <div class="profile-cruiser-stats-row-title"><p>HIV Status</p></div>
                  <div class="profile-cruiser-stats-row-badges">
                    <profile-cruiser-stats-badge><div class="profile-cruiser-stats-badge" data-testid="hivStatusNegative"><p>Negative</p></div></profile-cruiser-stats-badge>
                    <profile-cruiser-stats-badge><div class="profile-cruiser-stats-badge"><p>On PrEP</p></div></profile-cruiser-stats-badge>
                  </div>
                </div>
              </div>
            </profile-cruiser-stats-row>
          </profile-cruiser-stats-container>
          <div class="profile-section"><div>HIV Tested</div><div>Mar 28, 2026</div></div>
          <div class="profile-section"><div>STI Tested</div><div>Mar 28, 2026</div></div>
          <div class="profile-section"><div>Safeguards</div><div>DoxyPEP COVID Vaccinated</div></div>
          <div class="profile-rail">
            <button aria-label="Report Cruiser" title="Report">S</button>
            <button aria-label="Pin for Later" title="Favorite">*</button>
            <button aria-label="Profile info" title="Info">i</button>
            <button aria-label="Photos" title="Photos">P</button>
            <button aria-label="Message" title="Message">M</button>
          </div>
          <button aria-label="Back">Back</button>
        </app-profile>`;
    }

    function sceneProfileCompose() {
      clearFixture();
      fixture.innerHTML = `
        <app-profile style="display:block;position:relative;width:360px;height:520px">
          <div data-testid="profileHeadlineTableContainer">Registered Cruiser</div>
          <div class="profile-rail">
            <button aria-label="Report Cruiser">S</button>
            <button aria-label="Pin for Later">*</button>
            <button aria-label="Profile info">i</button>
            <button aria-label="Photos">P</button>
            <button aria-label="Message">M</button>
          </div>
          <button aria-label="Back">Back</button>
          <div id="chat-input-panel" data-testid="chatInputPanel" class="chat-input-panel" style="display:block;width:340px;height:100px">
            <textarea name="chatTextArea" data-testid="chatTextArea" placeholder="Message..."></textarea>
            <button type="button" data-testid="sendButton">Send</button>
          </div>
        </app-profile>`;
    }

    function sceneChat() {
      clearFixture();
      fixture.innerHTML = `
        <div id="chat-input-panel" data-testid="chatInputPanel" class="chat-input-panel" style="display:block;width:420px;height:120px">
          <form class="chat-input" name="submitChatForm">
            <textarea name="chatTextArea" data-testid="chatTextArea" placeholder="Message"></textarea>
            <button type="button" id="chat-input-send-text-or-saved-photo" data-testid="sendButton">Send</button>
          </form>
        </div>`;
      const send = fixture.querySelector('[data-testid="sendButton"]');
      send.addEventListener("click", () => {
        const ta = fixture.querySelector("textarea");
        send.dataset.lastSent = ta.value;
        ta.value = "";
        ta.dispatchEvent(new Event("input", { bubbles: true }));
      });
    }

    const scenes = { map: sceneMap, chats: sceneChats, profile: sceneProfile, chat: sceneChat };
    document.querySelectorAll("#controls [data-scene]").forEach((btn) => {
      btn.addEventListener("click", () => {
        scenes[btn.dataset.scene]();
        setTimeout(() => {
          const api = window.__sniffiesIntentBarIPhoneApi || window.__sniffiesIntentBarApi;
          if (api) api.renderBar(api.resolveViewState());
        }, 100);
      });
    });

    function assert(cond, msg) {
      return { ok: !!cond, msg };
    }

    async function wait(ms) {
      return new Promise((r) => setTimeout(r, ms));
    }

    async function runTests() {
      const api = window.__sniffiesIntentBarIPhoneApi || window.__sniffiesIntentBarApi;
      const lines = [];
      function log(item) {
        lines.push((item.ok ? "PASS" : "FAIL") + "  " + item.msg);
      }

      if (!api) {
        results.textContent = "FAIL  API not exposed";
        results.className = "fail";
        return;
      }

      log(assert(!document.getElementById("sniffies-split-shell"), "no Split shell"));
      log(assert(!document.getElementById("sniffies-split-fab"), "no Split FAB"));

      sceneMap();
      await wait(120);
      api.renderBar(api.resolveViewState());
      log(assert(api.resolveViewState() === "MAP", "MAP detected"));
      log(assert(document.getElementById("sniffies-iphone-bar")?.dataset.view === "MAP", "bar shows MAP"));
      log(assert(!!document.querySelector('#sniffies-iphone-bar [data-cmd="chats"]'), "floating bar has Chats"));
      log(assert(!!document.querySelector('#sniffies-iphone-bar [data-cmd="map"]'), "floating bar has Map"));
      log(assert(!!document.querySelector('#sniffies-iphone-bar [data-cmd="favorites"]'), "floating bar has Favorites"));
      log(assert(!!document.querySelector('#sniffies-iphone-bar [data-cmd="back"]'), "floating bar has Back"));
      log(assert(!!document.querySelector('#sniffies-iphone-bar [data-cmd="settings"]'), "floating bar has Settings"));
      log(assert(!document.querySelector('#sniffies-iphone-bar [data-cmd="message"]'), "no Message on bottom bar"));
      log(assert(!document.querySelector('#sniffies-iphone-bar [data-profile-row]'), "no old profile CTA row"));
      const sideMap = document.getElementById("sniffies-iphone-sidebar");
      log(assert(!sideMap || sideMap.style.display === "none", "sidebar hidden on MAP"));

      sceneChats();
      await wait(120);
      api.renderBar(api.resolveViewState());
      log(assert(api.resolveViewState() === "CHATS_LIST", "CHATS_LIST via visible rows/tabs"));
      log(assert(document.getElementById("sniffies-iphone-sidebar")?.style.display === "none", "sidebar hidden on CHATS_LIST"));

      sceneProfile();
      await wait(120);
      api.renderBar(api.resolveViewState());
      log(assert(api.resolveViewState() === "PROFILE", "PROFILE detected"));
      const side = document.getElementById("sniffies-iphone-sidebar");
      log(assert(!!side && side.style.display === "flex", "sidebar visible on PROFILE only"));
      log(assert(!!side.querySelector('[data-cmd="details"]'), "sidebar has Details"));
      log(assert(!!side.querySelector('[data-cmd="message"]'), "sidebar has Message"));
      log(assert(document.documentElement.classList.contains("sniffies-iphone-has-bar"), "profile inset class applied"));

      // Details opens our sectioned sheet (not gallery / not flat word dump)
      let nativePhotos = false;
      const photosBtn = document.querySelector('app-profile button[aria-label="Photos"]');
      if (photosBtn) photosBtn.addEventListener("click", () => { nativePhotos = true; }, { once: true });
      side.querySelector('[data-cmd="details"]').click();
      await wait(100);
      const detailsSheet = document.getElementById("sniffies-iphone-profile-details");
      const sheetText = detailsSheet?.textContent || "";
      log(assert(!!detailsSheet, "Details opens sectioned sheet"));
      log(assert(!nativePhotos, "Details does not open Photos/gallery"));
      log(assert(/HIV Status/i.test(sheetText), "details sheet has HIV Status section"));
      log(assert(/Into Public/i.test(sheetText), "details sheet has Into Public section"));
      log(assert(/Can host|Negative|PrEP|Cars/i.test(sheetText), "details sheet includes section values"));
      log(assert(!/Pulled from the open profile/i.test(sheetText), "old flat hint removed"));
      const scraped = api.scrapeProfileDetails?.();
      log(assert(!!scraped?.sections?.length, "scrape returns labeled sections"));
      detailsSheet?.remove();

      // Star → Pin for Later
      let nativePin = false;
      const pinBtn = document.querySelector('app-profile button[aria-label="Pin for Later"]');
      if (pinBtn) pinBtn.addEventListener("click", () => { nativePin = true; }, { once: true });
      side.querySelector('[data-cmd="favorites"]').click();
      await wait(80);
      log(assert(nativePin, "Star clicks Pin for Later"));

      // Block → Report Cruiser
      let nativeReport = false;
      const reportBtn = document.querySelector('app-profile button[aria-label="Report Cruiser"]');
      if (reportBtn) reportBtn.addEventListener("click", () => { nativeReport = true; }, { once: true });
      side.querySelector('[data-cmd="shield"]').click();
      await wait(80);
      log(assert(nativeReport, "Block clicks Report Cruiser"));

      // Photos opens gallery control
      nativePhotos = false;
      if (photosBtn) photosBtn.addEventListener("click", () => { nativePhotos = true; }, { once: true });
      side.querySelector('[data-cmd="pics"]').click();
      await wait(80);
      log(assert(nativePhotos, "Photos sidebar opens native Photos"));

      // Message clicks native Message rail button
      let nativeMsg = false;
      const nMsg = document.querySelector('app-profile button[aria-label="Message"]');
      if (nMsg) nMsg.addEventListener("click", () => { nativeMsg = true; }, { once: true });
      side.querySelector('[data-cmd="message"]').click();
      await wait(80);
      log(assert(nativeMsg, "Message sidebar btn clicks native Message"));

      // Wide text "Message" CTA under info (rail scan skips width>100) — sidebar must still hit it
      clearFixture();
      fixture.innerHTML = `
        <app-profile style="display:block;position:relative;width:360px;height:520px">
          <div data-testid="profileHeadlineTableContainer">Registered Cruiser</div>
          <div class="profile-section"><div>Into</div><div>Cars</div></div>
          <button type="button" class="profile-message-cta" style="display:block;width:220px;height:44px">Message</button>
          <button aria-label="Back">Back</button>
        </app-profile>`;
      await wait(120);
      api.renderBar(api.resolveViewState());
      let textMsg = false;
      const textCta = document.querySelector("app-profile button.profile-message-cta");
      if (textCta) textCta.addEventListener("click", () => { textMsg = true; }, { once: true });
      document.querySelector('#sniffies-iphone-sidebar [data-cmd="message"]')?.click();
      await wait(80);
      log(assert(!!api.findNativeMessageControl?.(), "findNativeMessageControl finds text Message CTA"));
      log(assert(textMsg, "sidebar Message clicks wide text Message CTA"));

      sceneProfileCompose();
      await wait(120);
      api.renderBar(api.resolveViewState());
      log(assert(api.resolveViewState() === "PROFILE", "profile+composer is PROFILE not CHAT"));
      log(assert(document.getElementById("sniffies-iphone-sidebar")?.style.display === "flex", "sidebar still on profile+composer"));
      log(assert(!document.getElementById("sniffies-iphone-composer") ||
        document.getElementById("sniffies-iphone-composer").style.display === "none", "no composer takeover on profile"));

      sceneChat();
      await wait(120);
      api.renderBar(api.resolveViewState());
      log(assert(api.resolveViewState() === "CHAT", "CHAT via chatInputPanel"));
      log(assert(document.getElementById("sniffies-iphone-sidebar")?.style.display === "none", "sidebar hidden on CHAT"));
      log(assert(!!document.getElementById("sniffies-iphone-composer"), "quick composer mounts"));
      log(assert(!!api.getChatTextArea(), "chat textarea found"));
      log(assert(!!api.getSendButton(), "send button found"));

      const ok = api.insertAndSendMessage("Harness ping");
      await wait(600);
      const sendBtn = document.querySelector('[data-testid="sendButton"]');
      log(assert(ok === true, "insertAndSendMessage returns true"));
      log(assert(sendBtn.dataset.lastSent === "Harness ping", "send button received text"));

      // Parked app-profile (off-screen) must not hide individual-chat composer
      clearFixture();
      fixture.innerHTML = `
        <app-profile style="position:fixed;left:-9999px;top:0;width:360px;height:640px;display:block">
          <div data-testid="profileHeadlineTableContainer">Parked Cruiser</div>
          <div data-testid="profileCruiserFullStatsContainer">Location Can host</div>
        </app-profile>
        <div id="chat-input-panel" data-testid="chatInputPanel" class="chat-input-panel" style="display:block;width:420px;height:120px">
          <textarea name="chatTextArea" data-testid="chatTextArea"></textarea>
          <button type="button" data-testid="sendButton">Send</button>
        </div>`;
      await wait(150);
      api.renderBar(api.resolveViewState());
      await wait(120); // allow MutationObserver tick after takeover parks native panel
      log(assert(api.resolveViewState() === "CHAT", "CHAT wins over parked off-screen profile"));
      log(assert(!!document.getElementById("sniffies-iphone-composer") &&
        document.getElementById("sniffies-iphone-composer").style.display !== "none", "composer visible with parked profile"));
      log(assert(document.body.classList.contains("sniffies-iphone-composer-takeover"), "takeover stays on while CHAT"));

      // Native-shaped scrape (profile-stats + cruiser rows)
      sceneProfile();
      await wait(80);
      const scrapedNative = api.scrapeProfileDetails?.();
      log(assert(/27.*m|5'9"|gay|top/i.test(scrapedNative?.summary || ""), "scrape summary from profile-stats testids"));
      log(assert((scrapedNative?.sections || []).some((s) => s.label === "Location" && /Can host|hosting/i.test(s.values.join(" "))), "scrape Location from cruiser row"));
      log(assert((scrapedNative?.sections || []).some((s) => s.label === "HIV Status" && /Negative/i.test(s.values.join(" "))), "scrape HIV Status from badge"));

      sceneChats();
      const panel = document.createElement("div");
      panel.id = "chat-input-panel";
      panel.setAttribute("data-testid", "chatInputPanel");
      panel.style.cssText = "display:block;width:100px;height:40px";
      panel.innerHTML = '<textarea name="chatTextArea" data-testid="chatTextArea"></textarea><button data-testid="sendButton">Send</button>';
      fixture.appendChild(panel);
      await wait(50);
      log(assert(api.resolveViewState() === "CHAT", "CHAT wins over CHATS_LIST when composer visible"));

      clearFixture();
      fixture.innerHTML = '<div data-testid="chat-global-messages-panel" style="display:block;width:200px;height:200px">global</div>';
      await wait(50);
      api.renderBar(api.resolveViewState());
      log(assert(api.resolveViewState() === "MAP", "global chat panel alone is not private CHAT"));
      log(assert(document.getElementById("sniffies-iphone-sidebar")?.style.display === "none", "sidebar hidden after leaving profile"));

      // /profile/:id/chat must be CHAT even with on-screen profile chrome
      clearFixture();
      fixture.innerHTML = `
        <app-profile style="display:block;width:360px;height:400px">
          <div data-testid="profileHeadlineTableContainer">Registered Cruiser</div>
          <button data-testid="pinUserButton" aria-label="Pin user">Pin</button>
          <div id="chat-input-panel" data-testid="chatInputPanel" style="display:block;width:340px;height:80px">
            <textarea name="chatTextArea" data-testid="chatTextArea"></textarea>
            <button data-testid="sendButton">Send</button>
          </div>
        </app-profile>`;
      const prevPath = location.pathname;
      history.replaceState({}, "", "/profile/abc123/chat");
      await wait(80);
      api.renderBar(api.resolveViewState());
      log(assert(api.resolveViewState() === "CHAT", "/profile/:id/chat is CHAT not PROFILE"));
      log(assert(document.getElementById("sniffies-iphone-sidebar")?.style.display === "none", "sidebar hidden on profile chat path"));
      log(assert(!!document.getElementById("sniffies-iphone-composer") &&
        document.getElementById("sniffies-iphone-composer").style.display !== "none", "composer on profile chat path"));
      history.replaceState({}, "", prevPath || "/");

      const failed = lines.filter((l) => l.startsWith("FAIL")).length;
      results.className = failed ? "fail" : "pass";
      results.textContent = lines.join("\n") + "\n\n" + (failed ? failed + " failed" : "All passed");
    }

    document.getElementById("run-tests").onclick = runTests;
    sceneMap();
    setTimeout(runTests, 200);
  </script>
</body>
</html>
